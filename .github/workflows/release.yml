name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  release:
    # Only the repo owner may trigger a release, even if tag protection is bypassed
    if: github.actor == 'kylebrodeur'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:libs

      - name: Publish all public packages
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" == *"-"* ]]; then
            # Prerelease version (e.g., 0.3.0-beta.1) -> extract tag name before the dot
            TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
            PUBLISH_TAG_ARGS="--tag $TAG"
          else
            PUBLISH_TAG_ARGS=""
          fi
          pnpm --filter @kylebrodeur/page-agent-llms publish --access public $PUBLISH_TAG_ARGS
          pnpm --filter @kylebrodeur/page-agent-page-controller publish --access public $PUBLISH_TAG_ARGS
          pnpm --filter @kylebrodeur/page-agent-core publish --access public $PUBLISH_TAG_ARGS
          pnpm --filter @kylebrodeur/page-agent publish --access public $PUBLISH_TAG_ARGS
          pnpm --filter @kylebrodeur/page-agent-mcp publish --access public $PUBLISH_TAG_ARGS
